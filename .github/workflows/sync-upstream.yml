name: Push to Fork

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to push (e.g., patched/v2026.4.10, main)'
        required: true
        type: string
      
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout local repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push to fork
        run: |
          branch="${{ github.event.inputs.branch }}"
          echo "Pushing $branch to fork..."
          
          # Push the specified branch
          if git show-ref --verify --quiet "refs/heads/$branch"; then
            git push origin "$branch"
            echo "✓ Pushed $branch"
          else
            echo "✗ Branch $branch not found locally"
            exit 1
          fi
          
          # Also push tags
          git push origin --tags || echo "Some tags already up to date"